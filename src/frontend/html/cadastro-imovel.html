<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/cadastro-imovel.css">
</head>

<body>
    <nav>
        <ul>
            <li><a href="../index.html">Página Inicial</a></li>
            <!-- <li><a href="cadastro.html">Cadastro</a></li> -->
            <!-- <li><a href="consulta.html">Consulta</a></li> -->
            <li><a href="sobreNos.html">Sobre Nós</a></li>
        </ul>
    </nav>
    <div id="h_buttons">
        <button id="bt_apagar_cadastro">Apagar</button>
        <button id="bt_salvar_alteracoes">Salvar</button>
    </div>
    <div class="tab">
        <button class="tablinks" id="tab_imovel" onclick="openTab(event, 'container_cadastro')"
            role="tab">Cadastro</button>
        <button class="tablinks" id="tabs_anuncio" onclick="openTab(event, 'container_anuncio')"
            role="tab">Anuncio</button>
    </div>

    <div id="container_cadastro" style="display: grid;" role="tabpanel" class="tabcontent">
        <label id="stt_ref" for="">ref:</label>
        <textarea name="" id="ta_ref" disabled=True></textarea>
        <label for="" id="stt_categoria">Categoria:</label>
        <select name="" id="select_categoria" prompt="Selecionar"></select>
        <label for="" id="stt_situacao">Situação</label>
        <select name="" id="select_situacao"></select>
        <label for="" id="stt_estado_select">Estado:</label>
        <select name="" id="select_estado" prompt="Selecionar"></select>
        <label for="" id="stt_ocupacao">Ocupação:</label>
        <select name="" id="select_ocupacao" prompt="Selecionar"></select>
        <label for="" id="stt_status">Status:</label>
        <select name="" id="select_status" prompt="Selecionar"></select>
        <label for="" id="stt_nome_condominio">Nome do Condomínio</label>
        <textarea name="" id="ta_nome_condominio"></textarea>
        <label for="" id="stt_ano_construcao">Ano de Construção</label>
        <input type="text" template="0000" id="ta_ano_construcao" validators=Length(minimum=4, maximum=4)
            valid_empty=True>
        <label for="" id="stt_cep">CEP</label>
        <input type="text" template="00000-000" id="ta_cep" validators=Length(minimum=9, maximum=9) valid_empty=False>
        <label for="" id="stt_rua">Rua</label>
        <textarea name="" id="ta_rua" disabled=True></textarea>
        <label for="" id="stt_numero">Número</label>
        <input type="text" id="ta_numero" type="integer" valid_empty=True>
        <label for="" id="stt_complemento">Complemento</label>
        <textarea name="" id="ta_complemento"></textarea>
        <label for="" id="stt_bloco">Bloco</label>
        <textarea name="" id="ta_bloco"></textarea>
        <label for="" id="stt_andar">Andar</label>
        <input type="text" template="00" id="ta_andar" validators=Length(minimum=1, maximum=2 valid_empty=True>
        <label for="" id="stt_bairro">Bairro</label>
        <textarea name="" id="ta_bairro" disabled=True></textarea>
        <label for="" id="stt_cidade">Cidade</label>
        <textarea name="" id="ta_cidade" disabled=True></textarea>
        <label for="" id="stt_estado">Estado</label>
        <input type="text" disabled=True, template="XX" , id="ta_estado" , validators=Length(minimum=2, maximum=2)>
        <label for="" id="stt_salas">Salas</label>
        <input type="text" template="00" id="ta_salas" validators=Length(minimum=1, maximum=2) valid_empty=True>
        <label for="" id="stt_banheiros">Banheiros</label>
        <input type="text" template="00" id="ta_banheiros" validators=Length(minimum=1, maximum=2) valid_empty=True>
        <label for="" id="stt_vagas">Vagas</label>
        <input type="text" template="00" id="ta_vagas" validators=Length(minimum=1, maximum=2) valid_empty=True>
        <label for="" id="stt_varandas">Varandas</label>
        <input type="text" template="00" id="ta_varandas" validators=Length(minimum=1, maximum=2) valid_empty=True>
        <label for="" id="stt_quartos">Quartos</label>
        <input type="text" template="00" id="ta_quartos" validators=Length(minimum=1, maximum=2) valid_empty=True>
        <label for="" id="stt_area_total">Área Total</label>
        <input type="text" id="ta_area_total" type="number">
        <label for="" id="stt_area_privativa">Área Privativa</label>
        <input type="text" id="ta_area_privativa" type="number">
        <label for="" id="stt_venda">Valor Venda:</label>
        <input type="text" id="ta_venda" type="number">
        <label for="" id="stt_aluguel">Valor Aluguel:</label>
        <input type="text" id="ta_aluguel" type="number">
        <label for="" id="stt_condominio">Valor Condomínio:</label>
        <input type="text" id="ta_condominio" type="number">
        <label for="" id="stt_iptu">Valor IPTU:</label>
        <input type="text" id="ta_iptu" type="number">
    </div>
    <div id="container_anuncio" style="display: none;" role="tabpanel" class="tabcontent">
        <label for="">Titulo</label>
        <div>
            <textarea name="" id="ta_titulo_anuncio"></textarea>
        </div>
        <label for="">Descriçao</label>
        <div>
            <textarea name="" id="ta_descricao_anuncio"></textarea>
        </div>
        <label for="">Apartamento</label>
        <div id="container_info_imovel">
            <label for="">Condomínio</label>
            <div id="container_info_condominio">
            </div>
        </div>
    </div>
    <div id="container_imagens" class="container">
        <label for="">Imagens:</label>
        <button id="bt_adicionar_imagens">Adicionar</button>
    </div>
    <div id="container_anexos" class="container">
        <label for="">Anexos:</label>
        <button id="bt_adicionar_anexos">Adicionar</button>
    </div>
    <div id="container_proprietario" class="container">
        <label for="" classes="stt_container_titulo">Proprietario: </label>
        <button classes="bt_editar_pessoa" id="br_editar_proprietario">Editar</button>
    </div>
    <div id="container_corretor" class="container">
        <label for="" classes="stt_container_titulo">Corretor: </label>
        <button id="br_editar_corretor" classes="bt_editar_pessoa">Editar</button>
    </div>
    <div id="container_captador" class="container">
        <label for="" classes="stt_container_titulo">Captador: </label>
        <button classes="bt_editar_pessoa" id="br_editar_captador">Editar</button>
    </div>
    <div id="container_portais" class="container">
        <label for="" classes="stt_container_titulo">Portais: </label>
        <button>Cadastrar Portal</button>
    </div>
    <div id="container_mapa" class="container">
        <gmp-map center="41.027748173921374, -92.41852445367961" zoom="13" map-id="DEMO_MAP_ID"
            style="height: 400px"></gmp-map>
    </div>
    <footer>
        <p>Copyright 2025 - By Lucas Hartmann</p>
        <a href="https://github.com/lucashartmann" target="_blank"><img src="assets/github-logo.png" alt=""></a>
    </footer>
</body>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=maps,marker" defer></script>
<script src="../js/cadastro-imovel.js"></script>

</html>
