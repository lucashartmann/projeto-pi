<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/base.css">

<body>
    <nav>
        <ul>
            <li><a href="../index.html">Página Inicial</a></li>
            <li><a href="sobreNos.html">Sobre Nós</a></li>
            <li><a href="html/login.html">Login</a></li>
        </ul>
    </nav>
    <div>
        <div>:
            <label>Username</label>
            <textarea id="inpt_username"></textarea>
            <label>Nome</label>
            <textarea id="inpt_nome"></textarea>
            <label>CPF/CNPJ</label>
            <input template="000.000.000-00" id="inpt_cpf" minlength="11" maxlength="14" >
            <label>RG</label>
            <input id="inpt_rg" placeholder="RG aqui" minlength="7" maxlength="9" >
            <label>"Telefone"</label>
            <input template="(00) 00000-0000" id="inpt_telefone">
            <label>Endereco</label>
            <label>Email</label>
            <textarea id="inpt_email"></textarea>
            <label>Senha</label>
            <input placeholder="alterar senha" id="inpt_senha" password=True>
            <label id="stt_data_nascimento">Data de nascimento</label>
            <input template="00/00/0000" id="inpt_data_nascimento" minlength="10" maxlength="10" 
                >
        </div>
        <div>:
            <label>Quartos</label>
            <input template="00">
            <label>Banheiros</label>
            <input template="00">
            <label>CEP desejado</label>
            <input template="00000-000">
        </div>
        <div>:
            <button>Salvar</button>
            <label id="stt_compras">Imoveis do usuário</label>
        </div>
    </div>
    <footer>

        <a href="https://github.com/lucashartmann" target="_blank"><img src="assets/github-logo.png" alt=""></a>
    </footer>

</html>
